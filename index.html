    <style>
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { overscroll-behavior: none; }

        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .safe-bottom { padding-bottom: calc(5rem + env(safe-area-inset-bottom)); }

        /* Transição suave entre telas */
        .tela { position: fixed; inset: 0; background: #0F172A; z-index: 30; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; }
        .tela-entrada { animation: telaEntrar 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }
        .tela-saida { animation: telaSair 0.25s cubic-bezier(0.55, 0.06, 0.68, 0.19) forwards; pointer-events: none; }
        @keyframes telaEntrar { from { opacity: 0; transform: translateX(60px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes telaSair { from { opacity: 1; transform: translateX(0); } to { opacity: 0; transform: translateX(-60px); } }

        /* Detalhes sobe de baixo */
        .detalhes-entrada { animation: detalhesEntrar 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }
        .detalhes-saida { animation: detalhesSair 0.3s cubic-bezier(0.55, 0.06, 0.68, 0.19) forwards; pointer-events: none; }
        @keyframes detalhesEntrar { from { opacity: 0; transform: translateY(100%); } to { opacity: 1; transform: translateY(0); } }
        @keyframes detalhesSair { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(100%); } }

        /* Card hover otimizado */
        .card-item { will-change: transform; contain: layout style paint; }
        .card-item:active { transform: scale(0.97); transition: transform 0.1s; }

        /* Skeleton loading */
        .skeleton { background: linear-gradient(90deg, #1E293B 25%, #2a3a52 50%, #1E293B 75%); background-size: 200% 100%; animation: shimmer 1.5s ease-in-out infinite; border-radius: 0.5rem; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* Fade in suave para cards */
        .card-fade { opacity: 0; animation: cardAparecer 0.4s ease forwards; }
        @keyframes cardAparecer { to { opacity: 1; } }

        /* Toast */
        .toast-entrada { animation: toastIn 0.3s ease forwards; }
        .toast-saida { animation: toastOut 0.3s ease forwards; }
        @keyframes toastIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes toastOut { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(30px); } }

        /* Botão ativo do menu inferior */
        .nav-btn { transition: color 0.2s, transform 0.15s; }
        .nav-btn:active { transform: scale(0.9); }
        .nav-ativo { color: #E50914 !important; }

        /* Categorias grid */
        .cat-card { transition: transform 0.2s, box-shadow 0.2s; }
        .cat-card:active { transform: scale(0.95); }

        /* Barra de busca foco */
        #campoBusca:focus + .busca-borda { border-color: #E50914; }

        /* Imagem com fade-in */
        .img-lazy { opacity: 0; transition: opacity 0.4s ease; }
        .img-lazy.carregada { opacity: 1; }
    </style>

        // === TOAST ===
        function mostrarToast(msg, icon = 'fa-check-circle', cor = 'text-green-400') {
            const toast = $('toast');
            $('toastIcon').className = 'fa ' + icon + ' ' + cor;
            $('toastMsg').textContent = msg;
            toast.classList.remove('hidden');
            toast.firstElementChild.className = toast.firstElementChild.className.replace('toast-saida', '');
            toast.firstElementChild.classList.add('toast-entrada');
            setTimeout(() => {
                toast.firstElementChild.classList.remove('toast-entrada');
                toast.firstElementChild.classList.add('toast-saida');
                setTimeout(() => toast.classList.add('hidden'), 300);
            }, 2200);
        }

        // === SKELETON LOADING ===
        function mostrarSkeleton() {
            const grade = $('gradeConteudos');
            grade.innerHTML = '';
            for (let i = 0; i < 9; i++) {
                const el = document.createElement('div');
                el.className = 'skeleton h-[220px] rounded-lg';
                el.style.animationDelay = (i * 0.1) + 's';
                grade.appendChild(el);
            }
        }

        // === IMAGEM LAZY FADE-IN ===
        function imgComFade(img) {
            if (img.complete) { img.classList.add('carregada'); return; }
            img.onload = () => img.classList.add('carregada');
            img.onerror = () => { img.src = 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="300" height="450" fill="%231E293B"><rect width="300" height="450"/><text x="150" y="225" text-anchor="middle" fill="%2394A3B8" font-size="14" font-family="sans-serif">Sem imagem</text></svg>'); img.classList.add('carregada'); };
        }

        // === EXIBIR GRADE ===
        function exibirGrade(lista, append = false) {
            const grade = $('gradeConteudos');
            if (!append) grade.innerHTML = '';

            if (!lista.length) {
                grade.innerHTML = '<div class="col-span-3 text-center py-12 text-textMuted"><i class="fa fa-film text-4xl mb-3 block opacity-30"></i><p class="text-base">Nenhum resultado encontrado</p></div>';

            }

            const frag = document.createDocumentFragment();
            lista.forEach((item, idx) => {
                const cartao = document.createElement('div');
                cartao.className = 'card-item card-fade relative rounded-lg overflow-hidden shadow-lg cursor-pointer';
                cartao.style.animationDelay = (idx * 0.05) + 's';
                cartao.onclick = () => abrirDetalhes(item);
                cartao.innerHTML = `
                    ${item.novo ? '<span class="absolute top-2 left-2 bg-accent text-white text-[10px] font-bold px-2 py-0.5 rounded z-[2]">NOVO</span>' : ''}
                    <img src="${item.capa}" alt="${item.titulo}" class="w-full h-[220px] object-cover bg-cardBg img-lazy" loading="lazy">
                    <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/90 via-black/40 to-transparent p-2.5 pt-8">
                        <p class="font-semibold text-sm text-white">${item.info}</p>
                        <p class="text-xs text-textMuted truncate mt-0.5">${item.titulo}</p>
                    </div>
                `;
                frag.appendChild(cartao);
            });
            grade.appendChild(frag);

            // Lazy fade-in nas imagens
            requestAnimationFrame(() => {
                grade.querySelectorAll('.img-lazy').forEach(imgComFade);
            });
        }

        // === CARREGAR DADOS ===
        async function carregarDados(categoria = 'inicio', pag = 1, append = false) {
            categoriaAtiva = categoria;
            paginaAtual = pag;

            if (categoria === 'inicio') {
                if (append) {
                    exibirGrade(dadosIniciais.slice(pag * 9), true);
                } else {
                    exibirGrade(dadosIniciais);
                }
                $('areaCarregarMais').classList.remove('hidden');
                return;
            }

            if (!append) mostrarSkeleton();

            let endereco = '';
            switch(categoria) {
                case 'filmes': endereco = `${BASE_URL}/movie/popular?api_key=${API_KEY}&language=${IDIOMA}&page=${pag}`; break;
                case 'series': endereco = `${BASE_URL}/tv/popular?api_key=${API_KEY}&language=${IDIOMA}&page=${pag}`; break;
                case 'lancamentos': endereco = `${BASE_URL}/movie/now_playing?api_key=${API_KEY}&language=${IDIOMA}&page=${pag}`; break;
                case 'populares': endereco = `${BASE_URL}/trending/all/week?api_key=${API_KEY}&language=${IDIOMA}&page=${pag}`; break;
                case 'animes': endereco = `${BASE_URL}/discover/tv?api_key=${API_KEY}&language=${IDIOMA}&with_genres=16&page=${pag}`; break;
            }

            try {
                const resp = await fetch(endereco);
                const dados = await resp.json();
                if (!dados.results) throw new Error('API error');
                const lista = dados.results.map(i => ({
                    id: i.id, titulo: i.title || i.name,
                    info: `${(i.vote_average||0).toFixed(1)} - ${(i.release_date||i.first_air_date||'').substring(0,4)}`,
                    capa: i.poster_path ? IMG_URL + i.poster_path : '',
                    novo: Math.random() > 0.7, nota: i.vote_average || 0,
                    ano: (i.release_date || i.first_air_date || '????').substring(0,4),
                    tipo: i.title ? 'Filme' : 'Série',
                    sinopse: i.overview || 'Sem descrição disponível.'
                })).filter(i => i.capa);
                exibirGrade(lista, append);
                $('areaCarregarMais').classList.toggle('hidden', pag >= (dados.total_pages || 1));
            } catch {
                if (!append) exibirGrade(dadosIniciais);
                $('areaCarregarMais').classList.add('hidden');
            }
        }

        // === ADICIONAR AO HISTÓRICO ===
        function adicionarHistorico(item) {
            historico = historico.filter(h => h.id !== item.id);
            historico.unshift({ ...item, vistoEm: new Date().toLocaleString('pt-BR') });
            if (historico.length > 20) historico = historico.slice(0, 20);
            localStorage.setItem('historico', JSON.stringify(historico));
        }

        // === DETALHES ===
        function abrirDetalhes(dados) {
            adicionarHistorico(dados);
            $('imgDetalheCapa').src = dados.capa;
            imgComFade($('imgDetalheCapa'));
            $('tituloDetalhe').textContent = dados.titulo;
            $('notaDetalhe').textContent = dados.nota > 0 ? '\u2B50 ' + dados.nota.toFixed(1) : '';
            $('anoDetalhe').textContent = dados.ano;
            $('tipoDetalhe').textContent = dados.tipo;

            // Verificar se já é favorito
            const jaFav = favoritos.some(f => f.id === dados.id);
            $('btnFavoritar').innerHTML = jaFav ? '<i class="fa fa-check"></i>' : '<i class="fa fa-plus"></i>';
            $('btnFavoritar').title = jaFav ? 'Na sua lista' : 'Adicionar à lista';

            // Verificar se já foi baixado
            const jaBaixado = baixados.some(b => b.id === dados.id);
            $('btnBaixar').innerHTML = jaBaixado ? '<i class="fa fa-check text-green-400"></i>' : '<i class="fa fa-download"></i>';

            $('sinopseDetalhe').textContent = dados.sinopse;

            const tela = $('telaDetalhes');
            tela.classList.remove('hidden', 'detalhes-saida');
            tela.classList.add('detalhes-entrada');
            document.body.style.overflow = 'hidden';

            // Salvar ref para botões
            tela._dados = dados;
        }

        function fecharDetalhes() {
            const tela = $('telaDetalhes');
            tela.classList.remove('detalhes-entrada');
            tela.classList.add('detalhes-saida');
            setTimeout(() => { tela.classList.add('hidden'); document.body.style.overflow = ''; }, 300);
        }

        // === PLAYER ===
        function abrirPlayer(dados) {
            $('tituloPlayer').textContent = dados.titulo;
            $('infoPlayer').textContent = dados.ano + ' - ' + dados.tipo;
            tempoSegundos = 0;
            $('barraProgresso').style.width = '0%';
            $('tempoAtual').textContent = '00:00';
            $('btnPlayPause').innerHTML = '<i class="fa fa-pause"></i>';

            const tela = $('telaPlayer');
            tela.classList.remove('hidden', 'tela-saida');
            tela.classList.add('tela-entrada');
            document.body.style.overflow = 'hidden';

            // Simular progresso
            if (playerIntervalo) clearInterval(playerIntervalo);
            playerIntervalo = setInterval(() => {
                tempoSegundos++;
                if (tempoSegundos >= 8100) { tempoSegundos = 0; }
                const pct = (tempoSegundos / 8100) * 100;
                $('barraProgresso').style.width = pct + '%';
                const h = String(Math.floor(tempoSegundos / 3600)).padStart(2, '0');
                const m = String(Math.floor((tempoSegundos % 3600) / 60)).padStart(2, '0');
                const s = String(tempoSegundos % 60).padStart(2, '0');
                $('tempoAtual').textContent = h + ':' + m + ':' + s;
            }, 1000);
        }

        function fecharPlayer() {
            if (playerIntervalo) { clearInterval(playerIntervalo); playerIntervalo = null; }
            const tela = $('telaPlayer');
            tela.classList.remove('tela-entrada');
            tela.classList.add('tela-saida');
            setTimeout(() => { tela.classList.add('hidden'); document.body.style.overflow = ''; }, 300);
        }

        // === TROCAR TELA PRINCIPAL ===
        function trocarTela(nome) {
            if (nome === 'inicio') {
                // Voltar para a tela principal
                ['telaCategorias', 'telaBaixados', 'telaPerfil', 'telaHistorico', 'telaPlayer'].forEach(id => {
                    $(id).classList.add('hidden');
                    $(id).classList.remove('tela-entrada');
                });
                $('telaPrincipal').classList.remove('hidden');
                $('barraSuperior').style.transform = '';
                $('barraCategorias').style.transform = '';
                telaAtiva = 'inicio';
                atualizarNavAtiva('inicio');
                return;
            }

            $('telaPrincipal').classList.add('hidden');

            // Fechar qualquer tela aberta
            ['telaCategorias', 'telaBaixados', 'telaPerfil', 'telaHistorico'].forEach(id => {
                $(id).classList.add('hidden');
                $(id).classList.remove('tela-entrada', 'tela-saida');
            });

            const telaMap = {
                categorias: { el: $('telaCategorias'), build: buildCategorias },
                baixados: { el: $('telaBaixados'), build: buildBaixados },
                perfil: { el: $('telaPerfil'), build: buildPerfil },
                historico: { el: $('telaHistorico'), build: buildHistorico },
            };

            const alvo = telaMap[nome];
            if (!alvo) return;

            // Esconder/mostrar barras
            if (nome === 'perfil' || nome === 'historico') {
                $('barraCategorias').style.transform = 'translateY(-100%)';
            } else {
                $('barraCategorias').style.transform = '';
            }

            alvo.build();
            alvo.el.classList.remove('hidden', 'tela-saida');
            alvo.el.classList.add('tela-entrada');
            alvo.el.scrollTop = 0;
            telaAtiva = nome;
            atualizarNavAtiva(nome);
        }

        function atualizarNavAtiva(nome) {
            const map = { inicio: 'inicio', categorias: 'categorias', baixados: 'baixados', perfil: 'perfil' };
            document.querySelectorAll('.nav-btn').forEach(btn => {
                const tela = btn.dataset.tela;
                btn.classList.toggle('nav-ativo', tela === (map[nome] || ''));
                btn.classList.toggle('text-textMuted', tela !== (map[nome] || ''));
            });
        }

        // === BUILD: CATEGORIAS ===
        function buildCategorias() {
            const grid = $('gridCategorias');
            grid.innerHTML = '';
            const frag = document.createDocumentFragment();
            categorias.forEach((cat, i) => {
                const card = document.createElement('div');
                card.className = `cat-card bg-gradient-to-br ${cat.cor} rounded-xl p-5 cursor-pointer relative overflow-hidden card-fade`;
                card.style.animationDelay = (i * 0.05) + 's';
                card.innerHTML = `<i class="fa ${cat.icon} text-3xl text-white/90 mb-2 block"></i><span class="text-white font-bold text-base">${cat.nome}</span><div class="absolute -right-3 -bottom-3 w-16 h-16 bg-white/10 rounded-full"></div>`;
                card.onclick = () => {
                    mostrarToast('Buscando ' + cat.nome + '...', 'fa-search', 'text-blue-400');
                    trocarTela('inicio');
                    // Resetar busca
                    $('campoBusca').value = '';
                    // Simular busca por categoria nos dados iniciais
                    const resultados = dadosIniciais.filter(d => d.titulo.toLowerCase().includes(cat.nome.toLowerCase()));
                    if (resultados.length > 0) {
                        exibirGrade(resultados);
                        $('areaCarregarMais').classList.add('hidden');
                    } else {
                        // Buscar na API
                        const genreMap = { 'Ação': 28, 'Comédia': 35, 'Drama': 18, 'Terror': 27, 'Ficção Científica': 878, 'Romance': 10749, 'Suspense': 53, 'Animação': 16, 'Documentário': 99, 'Fantasia': 14, 'Crime': 80, 'Aventura': 12 };
                        const genreId = genreMap[cat.nome] || '';
                        if (genreId) {
                            mostrarSkeleton();
                            fetch(`${BASE_URL}/discover/movie?api_key=${API_KEY}&language=${IDIOMA}&with_genres=${genreId}`)
                                .then(r => r.json()).then(dados => {
                                    if (dados.results) {
                                        const lista = dados.results.map(i => ({ id: i.id, titulo: i.title||i.name, info: `${(i.vote_average||0).toFixed(1)} - ${(i.release_date||i.first_air_date||'').substring(0,4)}`, capa: i.poster_path ? IMG_URL+i.poster_path : '', novo: false, nota: i.vote_average||0, ano: (i.release_date||i.first_air_date||'????').substring(0,4), tipo: i.title?'Filme':'Série', sinopse: i.overview||'Sem descrição.' })).filter(i=>i.capa);
                                        exibirGrade(lista);
                                    } else { exibirGrade(dadosIniciais); }
                                    $('areaCarregarMais').classList.add('hidden');
                                }).catch(() => { exibirGrade(dadosIniciais); $('areaCarregarMais').classList.remove('hidden'); });
                        } else {
                            exibirGrade(dadosIniciais);
                            $('areaCarregarMais').classList.remove('hidden');
                        }
                    }
                };
                frag.appendChild(card);
            });
            grid.appendChild(frag);
        }

        // === BUILD: HISTÓRICO ===
        function buildHistorico() {

                lista.innerHTML = `
                    <div class="text-center py-16 text-textMuted">
                        <i class="fa fa-clock-o text-5xl mb-4 block opacity-20"></i>

        // === FAVORITOS (tela via perfil) ===
        function buildFavoritos() {
            if (favoritos.length === 0) {
                $('telaPrincipal').classList.remove('hidden');
                $('telaPerfil').classList.add('hidden');
                exibirGrade([]);
                mostrarToast('Sua lista está vazia. Adicione filmes com o botão +', 'fa-heart', 'text-pink-400');
                $('areaCarregarMais').classList.add('hidden');
                return;
            }
            $('telaPrincipal').classList.remove('hidden');
            $('telaPerfil').classList.add('hidden');
            exibirGrade(favoritos);
            $('areaCarregarMais').classList.add('hidden');
            mostrarToast('Mostrando sua lista com ' + favoritos.length + ' título(s)', 'fa-heart', 'text-pink-400');
            atualizarNavAtiva('inicio');
        }

        // === INICIALIZAR EVENTOS ===
        function init() {
            // Navegação inferior
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const tela = btn.dataset.tela;
                    if (tela === 'inicio') {
                        $('campoBusca').value = '';
                        trocarTela('inicio');
                        carregarDados('inicio');
                    } else {
                        trocarTela(tela);
                    }
                });
            });

            // Menu categorias superior
            document.querySelectorAll('#menuCategorias li').forEach(aba => {
                aba.addEventListener('click', () => {
                    document.querySelectorAll('#menuCategorias li').forEach(el => el.classList.remove('text-white','font-bold','border-b-2','border-accent'));
                    aba.classList.add('text-white','font-bold','border-b-2','border-accent');
                    if (telaAtiva !== 'inicio') trocarTela('inicio');
                    $('campoBusca').value = '';
                    carregarDados(aba.dataset.cat);
                });
            });

            // Detalhes - fechar
            $('btnFecharDetalhes').addEventListener('click', fecharDetalhes);

            // Detalhes - assistir
            $('btnAssistir').addEventListener('click', () => {
                const dados = $('telaDetalhes')._dados;
                if (dados) abrirPlayer(dados);
            });

            // Detalhes - favoritar
            $('btnFavoritar').addEventListener('click', () => {
                const dados = $('telaDetalhes')._dados;
                if (!dados) return;
                const idx = favoritos.findIndex(f => f.id === dados.id);
                if (idx >= 0) {
                    favoritos.splice(idx, 1);
                    $('btnFavoritar').innerHTML = '<i class="fa fa-plus"></i>';
                    $('btnFavoritar').title = 'Adicionar à lista';
                    mostrarToast('Removido da sua lista', 'fa-minus-circle', 'text-red-400');
                } else {
                    favoritos.push(dados);
                    $('btnFavoritar').innerHTML = '<i class="fa fa-check"></i>';
                    $('btnFavoritar').title = 'Na sua lista';
                    mostrarToast('Adicionado à sua lista!', 'fa-heart', 'text-pink-400');
                }
                localStorage.setItem('favoritos', JSON.stringify(favoritos));
            });

            // Detalhes - baixar
            $('btnBaixar').addEventListener('click', () => {
                const dados = $('telaDetalhes')._dados;
                if (!dados) return;
                const jaBaixado = baixados.some(b => b.id === dados.id);
                if (jaBaixado) {
                    baixados = baixados.filter(b => b.id !== dados.id);
                    $('btnBaixar').innerHTML = '<i class="fa fa-download"></i>';
                    mostrarToast('Download removido', 'fa-trash', 'text-red-400');
                } else {
                    baixados.push(dados);
                    $('btnBaixar').innerHTML = '<i class="fa fa-check text-green-400"></i>';
                    mostrarToast('Baixado com sucesso!', 'fa-download', 'text-green-400');
                }
                localStorage.setItem('baixados', JSON.stringify(baixados));
            });

            // Detalhes - compartilhar
            $('btnCompartilhar').addEventListener('click', () => {
                const dados = $('telaDetalhes')._dados;
                if (dados && navigator.share) {
                    navigator.share({ title: dados.titulo, text: dados.sinopse }).catch(() => {});
                } else {
                    mostrarToast('Link copiado!', 'fa-share-alt', 'text-blue-400');
                }
            });

            // Player - fechar
            $('btnFecharPlayer').addEventListener('click', fecharPlayer);

            // Player - play/pause
            $('btnPlayPause').addEventListener('click', () => {
                if (playerIntervalo) {
                    clearInterval(playerIntervalo);
                    playerIntervalo = null;
                    $('btnPlayPause').innerHTML = '<i class="fa fa-play"></i>';
                } else {
                    playerIntervalo = setInterval(() => {
                        tempoSegundos++;
                        if (tempoSegundos >= 8100) tempoSegundos = 0;
                        $('barraProgresso').style.width = (tempoSegundos / 8100 * 100) + '%';
                        const h = String(Math.floor(tempoSegundos/3600)).padStart(2,'0');
                        const m = String(Math.floor((tempoSegundos%3600)/60)).padStart(2,'0');
                        const s = String(tempoSegundos%60).padStart(2,'0');
                        $('tempoAtual').textContent = h+':'+m+':'+s;
                    }, 1000);
                    $('btnPlayPause').innerHTML = '<i class="fa fa-pause"></i>';
                }
            });

            // Ícone histórico (barra de busca)
            $('btnHistorico').addEventListener('click', () => {
                $('campoBusca').value = '';
                trocarTela('historico');
            });

            // Ícone baixados (barra de busca)
            $('btnBaixadosTopo').addEventListener('click', () => {
                $('campoBusca').value = '';
                trocarTela('baixados');
            });

            // Carregar mais
            $('btnCarregarMais').addEventListener('click', () => {
                carregarDados(categoriaAtiva, paginaAtual + 1, true);
            });

            // Busca com debounce
            let tempoBusca;
            $('campoBusca').addEventListener('input', e => {
                clearTimeout(tempoBusca);
                const termo = e.target.value.trim();
                if (!termo) {
                    if (telaAtiva !== 'inicio') trocarTela('inicio');
                    return carregarDados(categoriaAtiva);
                }
                if (telaAtiva !== 'inicio') trocarTela('inicio');
                tempoBusca = setTimeout(async () => {
                    mostrarSkeleton();
                    try {
                        const resp = await fetch(`${BASE_URL}/search/multi?api_key=${API_KEY}&language=${IDIOMA}&query=${encodeURIComponent(termo)}`);
                        const dados = await resp.json();
                        const lista = (dados.results||[]).filter(i => i.poster_path).map(i => ({
                            id: i.id, titulo: i.title || i.name,
                            info: `${(i.vote_average||0).toFixed(1)} - ${(i.release_date||i.first_air_date||'').substring(0,4)}`,
                            capa: IMG_URL + i.poster_path, novo: false, nota: i.vote_average || 0,
                            ano: (i.release_date || i.first_air_date || '????').substring(0,4),
                            tipo: i.media_type === 'tv' ? 'Série' : 'Filme',
                            sinopse: i.overview || 'Sem descrição disponível.'
                        }));
                        exibirGrade(lista);
                        $('areaCarregarMais').classList.add('hidden');
                    } catch {
                        const local = dadosIniciais.filter(d => d.titulo.toLowerCase().includes(termo.toLowerCase()));
                        exibirGrade(local.length ? local : dadosIniciais);
                        $('areaCarregarMais').classList.toggle('hidden', local.length > 0);
                    }
                }, 400);
            });

            // Eventos do perfil que abrem sub-telas
            document.addEventListener('abrir-favoritos', buildFavoritos);
            document.addEventListener('abrir-historico-nav', () => trocarTela('historico'));
            document.addEventListener('abrir-baixados-nav', () => trocarTela('baixados'));

            // Swipe para fechar detalhes
            let touchStartY = 0;
            $('telaDetalhes').addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; }, { passive: true });
            $('telaDetalhes').addEventListener('touchend', e => {
                const diff = e.changedTouches[0].clientY - touchStartY;
                if (diff > 100) fecharDetalhes();
            }, { passive: true });

            // Scroll suave - esconder/mostrar barra
            let lastScroll = 0;
            window.addEventListener('scroll', () => {
                const curr = window.scrollY;
                if (telaAtiva === 'inicio') {
                    $('barraSuperior').style.transform = curr > lastScroll && curr > 80 ? 'translateY(-100%)' : '';
                    $('barraCategorias').style.transform = (curr > lastScroll && curr > 130) ? 'translateY(-100%)' : '';
                }
                lastScroll = curr;
            }, { passive: true });

            // Iniciar
            carregarDados('inicio');
        }

        // === START ===
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    })();
    </script>
</body>
</html>
